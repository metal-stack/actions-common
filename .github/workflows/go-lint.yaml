---
name: Go Lint

on:
  workflow_call:

jobs:
  go-lint:
    name: Run golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          # TODO: check if this is still necessary:
          cache: false

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9
