---
name: Helm Chart

on:
  workflow_call:
    inputs:
      lint:
        description: Runs a job to lint the helm-chart.
        required: false
        default: true
        type: boolean
      oci-release:
        description: Runs a job to publish the helm chart as an oci artifact.
        required: false
        default: true
        type: boolean

      registry:
        description: The registry to publish the container artifact to.
        default: ghcr.io
        required: false
        type: string
      registry-username:
        description: The registry username to login with.
        default: ${{ github.actor }}
        required: false
        type: string

      container-image-values-patch:
        description: |
          If provided, patches the container image tag into the chart's values.yaml.
          The path must be provided in dotted-syntax, e.g. "image.tag".
        required: false
        type: string

      chart-name:
        description: Chart name
        default: ${{ github.event.repository.name }}
        required: false
        type: string
      chart-repository:
        description: Chart container sitory name
        default: ${{ github.repository_owner }}/charts
        required: false
        type: string
      chart-path:
        description: Chart path in the repository.
        required: true
        type: string

env:
  tag: "" # gets set dynamically during workflow run
  container_tag: "" # gets set dynamically during workflow run


jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    if: "${{ inputs.lint }}"
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: v3.20.1

    - name: Helm Lint
      run: |
        helm lint ${{ inputs.chart-path }}

  oci-release:
    name: Publish OCI Helm Chart
    runs-on: ubuntu-latest
    if: "${{ inputs.oci-release }}"
    steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Make tag
          run: |
            [ "${GITHUB_EVENT_NAME}" == 'pull_request' ] && echo "tag=v0.0.0-pull-request.${{ github.event.number }}" >> $GITHUB_ENV || true
            [ "${GITHUB_EVENT_NAME}" == 'release' ] && echo "tag=${GITHUB_REF##*/}" >> $GITHUB_ENV || true
            [ "${GITHUB_EVENT_NAME}" == 'push' ] && echo "tag=v0.0.0-${GITHUB_REF##*/}" >> $GITHUB_ENV || true

            # taken from go-build.yaml
            [ "${GITHUB_EVENT_NAME}" == 'pull_request' ] && echo "container_tag=pr-$(echo $GITHUB_REF | awk -F / '{print $3}')-${GITHUB_HEAD_REF##*/}" >> $GITHUB_ENV || true
            [ "${GITHUB_EVENT_NAME}" == 'release' ] && echo "container_tag=${GITHUB_REF##*/}" >> $GITHUB_ENV || true
            [ "${GITHUB_EVENT_NAME}" == 'push' ] && echo "container_tag=branch-${GITHUB_REF##*/}" >> $GITHUB_ENV || true

        # the replacement can be checked with:
        # helm show values oci://ghcr.io/metal-stack/charts/<chart>:<tag>
        - name: Patch container image tags in values.yaml
          uses: mikefarah/yq@v4
          with:
            cmd: yq e -i '.${{ inputs.container-image-values-patch }}="${{ env.container_tag }}"' ${{ inputs.chart-path }}/values.yaml
          if: "${{ inputs.container-image-values-patch != '' }}"

        - name: Release Helm OCI Artifact
          uses: appany/helm-oci-chart-releaser@v0.5.0
          with:
            name: ${{ inputs.chart-name }}
            repository: ${{ inputs.chart-repository }}
            tag: ${{ env.tag }}
            path: ${{ inputs.chart-path }}
            registry: ${{ inputs.registry }}
            registry_username: ${{ inputs.registry-username }}
            registry_password: ${{ secrets.GITHUB_TOKEN }}
