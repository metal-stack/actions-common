---
name: Go Build

on:
  workflow_call:
    inputs:
      build-command:
        description: The command used to build the Go binaries
        default: make
        required: false
        type: string
      registry:
        description: The registry to publish the container artifact to
        default: ghcr.io
        required: false
        type: string
      registry_username:
        description: The registry username
        default: ${{ github.actor }}
        required: false
        type: string

jobs:
  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - name: Registry login
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_username }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Make tag
        run: |
          [ "${GITHUB_EVENT_NAME}" == 'pull_request' ] && echo "tag=${GITHUB_HEAD_REF##*/}" >> $GITHUB_ENV || true
          [ "${GITHUB_EVENT_NAME}" == 'release' ] && echo "tag=${GITHUB_REF##*/}" >> $GITHUB_ENV || true
          [ "${GITHUB_EVENT_NAME}" == 'push' ] && echo "tag=latest" >> $GITHUB_ENV || true

      - name: Build
        run: |
          ${{ inputs.build-command }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          sbom: true
          tags: ${{ inputs.registry }}/${{ github.repository }}:${{ env.tag }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ inputs.registry }}/${{ github.repository }}:${{ env.tag }} \
            ${{ inputs.registry }}/${{ github.repository }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
