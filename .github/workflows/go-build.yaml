---
name: Go Build

on:
  workflow_call:
    inputs:
      build-command:
        description: The command used to build the Go binaries in case needed before building the container.
        required: false
        type: string
      registry:
        description: The registry to publish the container artifact to.
        default: ghcr.io
        required: false
        type: string
      registry-username:
        description: The registry username to login with.
        default: ${{ github.actor }}
        required: false
        type: string
      image-name:
        description: The resulting container image name.
        default: ${{ github.repository }}
        required: false
        type: string
      artifact-files:
        description: Allows uploading artifacts in order to re-use them in subsequent jobs. You can pass a file pattern or directory here.
        required: false
        type: string

env:
  tag: "" # gets set dynamically during workflow run

jobs:
  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - name: Registry login
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Make tag
        run: |
          [ "${GITHUB_EVENT_NAME}" == 'pull_request' ] && echo "tag=pr-$(echo $GITHUB_REF | awk -F / '{print $3}')-${GITHUB_HEAD_REF##*/}" >> $GITHUB_ENV || true
          [ "${GITHUB_EVENT_NAME}" == 'release' ] && echo "tag=${GITHUB_REF##*/}" >> $GITHUB_ENV || true
          [ "${GITHUB_EVENT_NAME}" == 'push' ] && echo "tag=branch-${GITHUB_REF##*/}" >> $GITHUB_ENV || true

      - name: Build
        run: |
          ${{ inputs.build-command }}
        if: "${{ inputs.build-command != '' }}"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: true
          sbom: true
          tags: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ env.tag }}

      - name: Build and push latest
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          sbom: true
          tags: ${{ inputs.registry }}/${{ inputs.image-name }}:latest
        if: github.event_name == 'release'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            ${{ inputs.registry }}/${{ inputs.image-name }}:${{ env.tag }} \
            ${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

      - uses: actions/upload-artifact@v7
        with:
          path: ${{ inputs.artifact-files }}
          if-no-files-found: error
          retention-days: 1
        if: "${{ inputs.artifact-files != '' }}"
